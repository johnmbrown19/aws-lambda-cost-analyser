name: package-lambda

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: ./scripts/package-lambda.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: build/lambda.zip
